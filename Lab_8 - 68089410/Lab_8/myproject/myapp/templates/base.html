<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ฟอนต์น่ารัก -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: #ffe4f0;
            background-image:
                radial-gradient(#ffb6d9 1.5px, transparent 1.5px),
                radial-gradient(#ffb6d9 1.5px, #ffe4f0 1.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            margin: 0;
        }

        /* กล่องเมนู */
        .navbar-pink {
            background: linear-gradient(90deg, #ff69b4, #ff85c1);
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(255,105,180,0.3);
        }

        .navbar-pink a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            transition: 0.3s;
            font-size: 14px;
        }

        .navbar-pink a:hover {
            background: white;
            color: #ff4da6;
        }

        /* กล่องเนื้อหา */
        .content-box {
            background: #fff0f6;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.2);
            position: relative;
        }

        /* หัวใจลอย */
        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            animation: float 4s infinite ease-in-out;
        }

        .heart:nth-child(1) { top: -10px; left: 20px; }
        .heart:nth-child(2) { top: -10px; right: 20px; animation-delay: 1s; }
        .heart:nth-child(3) { bottom: -10px; left: 40px; animation-delay: 2s; }

        @keyframes float {
            0% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-10px); opacity: 1; }
            100% { transform: translateY(0); opacity: 0.7; }
        }

        footer {
            text-align: center;
            padding: 15px;
            color: #ff4da6;
            font-size: 14px;
        }
    </style>

    {% block title %}
    {% endblock %}
</head>

<body>

   
    <!-- กล่องเนื้อหา -->
    <div class="content-box">
        <div class="heart">💖</div>
        <div class="heart">💗</div>
        <div class="heart">💞</div>

        {% block content %}
        {% endblock %}
    </div>

    <footer>
        © 2024 ICT12367 | Information Technology 💕
    </footer>

</body>
</html>
