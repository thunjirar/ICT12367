{% extends "base.html" %}
{% load static %}

{% block title %}
<title>Esther Bunny Gallery</title>
{% endblock %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #ffe6f2, #ffd6eb);
        font-family: 'Segoe UI', sans-serif;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
        max-width: 900px;
        margin: 40px auto;
    }

    .gallery img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 18px;
        display: block;
        border: 4px solid #ffd1e8;
        box-shadow: 0 6px 15px rgba(255,105,180,0.25);
        transition: 0.3s;
        background: white;
        padding: 6px;
        cursor: pointer;
    }

    .gallery img:hover {
        transform: scale(1.08) rotate(-2deg);
        box-shadow: 0 10px 25px rgba(255,20,147,0.4);
    }

    .title {
        text-align: center;
        color: #ff69b4;
        font-size: 36px;
        font-weight: bold;
        margin-top: 30px;
    }

    /* modal */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 182, 193, 0.85);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
    }

    .modal img {
        max-width: 80%;
        max-height: 80%;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        border: 6px solid white;
    }
</style>

<h1 class="title">Esther Bunny Gallery 🐰💖</h1>

{% load static %}
{% load static %}

<div class="gallery">
    

    <img src="https://s359.thaicdn.net//pagebuilder/5ddab3cf-cff8-486d-8aaf-3b60ad08694a.jpg" >

</div>

<!-- modal -->
<div class="modal" id="modal">
    <img id="modal-img">
</div>

<script>
    const images = document.querySelectorAll(".gallery img");
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modal-img");

    images.forEach(img => {
        img.addEventListener("click", () => {
            modal.style.display = "flex";
            modalImg.src = img.src;
        });
    });

    modal.addEventListener("click", () => {
        modal.style.display = "none";
    });
</script>

{% endblock %}
