{% extends "base.html" %}

{% block title %}
หน้าแรกของเว็บไซต์
{% endblock %}

{% block content %}
<a href="{% url 'add_person' %}" class="btn btn-primary mb-3">เพิ่มข้อมูลใหม่</a>

<table class="table table-hover">
    <thead>
        <tr>
            <th>รหัสประชากร</th>
            <th>ชื่อประชากร</th>
            <th>อายุ</th>
            <th>แก้ไข</th>
            <th>ลบ</th>
        </tr>
    </thead>
    <tbody>
        {% for person in all_person %}
        <tr>
            <td>{{ person.id }}</td>
            <td>{{ person.name }}</td>
            <td>{{ person.age }}</td>
            <td><a href="{% url 'edit_person' person.id %}" class="btn btn-warning">แก้ไข</a></td>
            <td><a href="{% url 'delete_person' person.id %}" class="btn btn-danger">ลบ</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
