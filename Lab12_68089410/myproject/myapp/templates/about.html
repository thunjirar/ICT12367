{% block content %}

<style>
.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    max-width: 900px;
    margin: 40px auto;
}

.gallery img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}
</style>

<h2 class="text-center mb-4">แกลเลอรีรูปภาพ</h2>
